name: Build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - platform: x64
            output_dir: x64
            artifact_name: Injector-x64
          - platform: x86
            output_dir: Win32
            artifact_name: Injector-x86

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Visual Studio 2026 Build Tools
        shell: pwsh
        run: |
          Write-Host "Installing VS 2026 Build Tools (v145 toolset)..."
          choco install visualstudio2026buildtools `
            --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 --includeRecommended --quiet" `
            -y --ignore-package-exit-codes=3010
          Write-Host "VS 2026 Build Tools installation completed"

      - name: Build ${{ matrix.platform }} Release
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Microsoft Visual Studio\18\BuildTools\Common7\Tools\VsDevCmd.bat"
          msbuild "Manual Map Injector.sln" /m ^
            /p:Configuration=Release ^
            /p:Platform=${{ matrix.platform }} ^
            /fl /flp:logfile=msbuild-${{ matrix.platform }}.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-log-${{ matrix.platform }}
          path: msbuild-${{ matrix.platform }}.log

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.output_dir }}/Release/*.exe
            ${{ matrix.output_dir }}/Release/*.pdb

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package binaries
        run: |
          mkdir release
          cd artifacts
          for dir in Injector-*/; do
            name="${dir%/}"
            (cd "$dir" && zip -r "../../release/${name}.zip" .)
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
